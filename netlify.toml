[build]
  command = "node build-gallery.js"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

# Build hook: regenerate gallery.json from _data/gallery/*.md files
[build.environment]
  NODE_VERSION = "18"
